libxposed-api = { group = "io.github.libxposed", name = "api", version.ref = "libxposed" }
lottie = { group = "com.airbnb.android", name = "lottie", version.ref = "lottie" }
androidx-palette = { group = "androidx.palette", name = "palette", version.ref = "palette" }
androidx-profile-installer = { group = "androidx.profileinstaller", name = "profileinstaller", version.ref = "profile-installer" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
